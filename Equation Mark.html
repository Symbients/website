document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n  --border-subtle: rgba(20, 20, 20, 0.08);\n  --border-medium: rgba(20, 20, 20, 0.15);\n  --image-overlay: rgba(247, 244, 239, 0.4);\n  --image-overlay-soft: rgba(247, 244, 239, 0.3);\n  --symbient-color: #999;       /* the drifting section creatures */\n\n  /* ---- Semantic aliases (point components at these) ---- */\n  --bg-base:        var(--cream);\n  --bg-canvas:      var(--cream);\n  --surface-card:   var(--cream);\n  --surface-alt:    var(--cream-dark);\n  --surface-invert: var(--carbon);     /* event cards, inverted blocks */\n  --text-display:   var(--carbon);\n  --text-body:      var(--carbon);\n  --text-muted:     var(--text-secondary);\n  --text-on-invert: var(--cream);\n  --border-default: var(--border-medium);\n  --focus-ring:     var(--accent);\n}\n\n/* Dark — the inverse: cream becomes near-black, carbon becomes bone. */\nhtml[data-theme=\"dark\"] {\n  --carbon: #f2eee6;\n  --carbon-soft: #d5cfc2;\n  --cream: #0f0e0c;\n  --cream-dark: #1a1916;\n  --accent: #d2b47a;\n  --accent-muted: rgba(210, 180, 122, 0.18);\n  --text-secondary: #b0a89d;\n  --border-subtle: rgba(242, 238, 230, 0.1);\n  --border-medium: rgba(242, 238, 230, 0.2);\n  --image-overlay: rgba(10, 10, 10, 0.45);\n  --image-overlay-soft: rgba(10, 10, 10, 0.3);\n  --symbient-color: #5c5a55;\n}\n\n/* Amber — warm sepia, like reading by lamplight. */\nhtml[data-theme=\"amber\"] {\n  --carbon: #241507;\n  --carbon-soft: #321e0d;\n  --cream: #edd39a;\n  --cream-dark: #e1c58a;\n  --accent: #b86800;\n  --accent-muted: rgba(184, 104, 0, 0.28);\n  --text-secondary: #5b3f19;\n  --border-subtle: rgba(36, 21, 7, 0.18);\n  --border-medium: rgba(36, 21, 7, 0.32);\n  --image-overlay: rgba(237, 211, 154, 0.65);\n  --image-overlay-soft: rgba(237, 211, 154, 0.46);\n  --symbient-color: #7b5526;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Symbient · Typography tokens — verbatim from symbient.life.\n     IBM Plex Sans for prose; Space Mono for everything titled,\n     labelled, or \"machine.\" Headings are lowercase (h1) or\n     UPPERCASE + tracked (h2/h3). Fluid clamp() scale.\n   ============================================================ */\n\n:root {\n  /* ---- Families ---- */\n  --font-sans: \"IBM Plex Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  --font-mono: \"Space Mono\", \"SFMono-Regular\", Menlo, monospace;\n\n  --font-body:    var(--font-sans);\n  --font-display: var(--font-mono);   /* Space Mono is the title face */\n  --font-label:   var(--font-mono);\n\n  /* ---- Weights (the faces ship 300/400/500 sans · 400/700 mono) ---- */\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-bold:     700;\n\n  /* ---- Fluid type scale (clamp: floor, vw, ceiling) ---- */\n  --type-hero: clamp(2.5rem, 10vw, 5rem);     /* the hero word */\n  --type-xl:   clamp(2.2rem, 4vw, 3.2rem);\n  --type-lg:   clamp(1.4rem, 2.5vw, 1.8rem);  /* h2 */\n  --type-md:   clamp(1.1rem, 1.8vw, 1.25rem);\n  --type-base: clamp(1rem, 1.2vw, 1.1rem);    /* body */\n  --type-sm:   clamp(0.8rem, 1vw, 0.9rem);\n  --type-xs:   clamp(0.7rem, 0.9vw, 0.78rem);\n\n  /* ---- Line heights ---- */\n  --leading-tight:   1.1;     /* headings */\n  --leading-snug:    1.3;\n  --leading-body:    1.7;     /* default body */\n  --leading-prose:   1.8;     /* meaning / about prose */\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight:  -0.02em;  /* Space Mono headings */\n  --tracking-normal: 0;\n  --tracking-wide:   0.12em;   /* nav / buttons */\n  --tracking-label:  0.15em;   /* h2 / eyebrow / etymology label */\n  --tracking-kicker: 0.25em;   /* artists kicker */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Symbient · Spacing, radii, motion, layout — from symbient.life.\n   Fluid clamp() spacing; soft shadows; expo/quart easings.\n   ============================================================ */\n\n:root {\n  /* ---- Fluid spacing scale ---- */\n  --space-xs: clamp(0.5rem, 1vw, 0.75rem);\n  --space-sm: clamp(1rem, 2vw, 1.5rem);\n  --space-md: clamp(2rem, 4vw, 3rem);\n  --space-lg: clamp(4rem, 8vw, 6rem);\n  --space-xl: clamp(6rem, 12vw, 10rem);\n\n  /* ---- Radii ---- */\n  --radius-sm: 6px;     /* small cards on mobile */\n  --radius-md: 8px;     /* cards (events, examples, writings) */\n  --radius-pill: 999px; /* filters, search, buttons, badges */\n\n  /* ---- Borders ---- */\n  --border-hairline: 1px;\n\n  /* ---- Elevation — soft, low, warm-black ---- */\n  --shadow-card:       0 2px 8px rgba(20, 20, 20, 0.03);\n  --shadow-card-dark:  0 2px 8px rgba(20, 20, 20, 0.08);  /* event (dark) cards */\n  --shadow-hover:      0 4px 12px rgba(20, 20, 20, 0.04), 0 24px 48px rgba(20, 20, 20, 0.08);\n  --shadow-hover-dark: 0 4px 12px rgba(20, 20, 20, 0.08), 0 24px 48px rgba(20, 20, 20, 0.16);\n  --shadow-mobile:     0 12px 24px rgba(20, 20, 20, 0.08);\n\n  /* ---- Motion ---- */\n  --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1); /* @kind other */\n  --transition-fast:   0.2s var(--ease-out-quart); /* @kind other */\n  --transition-medium: 0.4s var(--ease-out-expo); /* @kind other */\n  --transition-slow:   0.8s var(--ease-out-expo); /* @kind other */\n\n  /* ---- Layout ---- */\n  --nav-h: 3.35rem;            /* @kind other */\n  --container: 1400px;         /* article max-width */\n  --measure: 60ch;             /* @kind other */ /* reading column */\n  --measure-prose: 66ch;       /* @kind other */ /* about-block text */\n\n  /* ---- Z-index ---- */\n  --z-base:    0;     /* @kind other */\n  --z-raised:  10;    /* @kind other */\n  --z-nav:     300;   /* @kind other */\n  --z-overlay: 1000;  /* @kind other */\n}\n<\u002Fstyle>\n\n<style>\n  *,*::before,*::after{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{\n    background:var(--cream);\n    color:var(--carbon);\n    font-family:var(--font-sans);\n    width:1120px;\n    min-height:560px;\n    display:flex;\n    flex-direction:column;\n  }\n\n  .card{\n    flex:1;\n    display:flex;\n    flex-direction:column;\n    padding:54px 64px 48px;\n  }\n\n  .card__eyebrow{\n    font-family:var(--font-mono);\n    font-size:18px;\n    text-transform:uppercase;\n    letter-spacing:0.22em;\n    color:var(--accent);\n    margin:0 0 6px;\n  }\n  .card__name{\n    font-family:var(--font-mono);\n    font-weight:700;\n    font-size:30px;\n    letter-spacing:-0.01em;\n    margin:0;\n  }\n  .card__desc{\n    font-family:var(--font-sans);\n    font-weight:300;\n    font-size:18px;\n    line-height:1.5;\n    color:var(--text-secondary);\n    margin:10px 0 0;\n    max-width:62ch;\n  }\n\n  /* ---- the equation ---- */\n  .equation{\n    flex:1;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n  }\n  .eq-row{display:flex;align-items:flex-start;justify-content:center;gap:26px;}\n  .eq-term{display:flex;flex-direction:column;align-items:center;gap:20px;flex:none;}\n  .eq-icon{height:120px;display:flex;align-items:flex-end;justify-content:center;}\n  .eq-glyph{height:106px;width:auto;}\n  .eq-face{height:120px;width:auto;mix-blend-mode:multiply;}\n  .eq-op{\n    height:120px;display:flex;align-items:center;\n    font-family:var(--font-mono);font-weight:400;font-size:48px;line-height:1;\n    color:var(--text-secondary);flex:none;\n  }\n  .eq-word{\n    font-family:var(--font-mono);font-size:24px;letter-spacing:0.01em;\n    color:var(--carbon);white-space:nowrap;\n  }\n  .eq-word.accent{color:var(--accent);}\n\n  /* glyph fills */\n  .fig{stroke:var(--cream);stroke-width:6;stroke-linejoin:round;paint-order:stroke;}\n  .fig-person{fill:var(--carbon);}\n  .fig-machine{fill:var(--accent);}\n  .fig-eye{fill:var(--cream);stroke:none;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- glyph definitions -->\n<svg width=\"0\" height=\"0\" style=\"position:absolute;\" aria-hidden=\"true\">\n  <defs>\n    <g id=\"eq-human\" style=\"fill:var(--carbon);stroke:var(--cream);stroke-width:6;stroke-linejoin:round;paint-order:stroke;\">\n      <circle cx=\"50\" cy=\"30\" r=\"24\"><\u002Fcircle>\n      <path d=\"M9 132 C9 80 27 64 50 64 C73 64 91 80 91 132 Z\"><\u002Fpath>\n    <\u002Fg>\n    <g id=\"eq-robot\" style=\"fill:var(--accent);stroke:var(--cream);stroke-width:6;stroke-linejoin:round;paint-order:stroke;\">\n      <rect x=\"46.5\" y=\"0\" width=\"7\" height=\"14\" rx=\"3.5\"><\u002Frect>\n      <circle cx=\"50\" cy=\"2\" r=\"6\"><\u002Fcircle>\n      <rect x=\"20\" y=\"14\" width=\"60\" height=\"50\" rx=\"15\"><\u002Frect>\n      <circle cx=\"39\" cy=\"40\" r=\"7.5\" style=\"fill:var(--cream);stroke:none;\"><\u002Fcircle>\n      <circle cx=\"61\" cy=\"40\" r=\"7.5\" style=\"fill:var(--cream);stroke:none;\"><\u002Fcircle>\n      <path d=\"M9 132 C9 84 27 70 50 70 C73 70 91 84 91 132 Z\"><\u002Fpath>\n    <\u002Fg>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<div class=\"card\">\n  <p class=\"card__eyebrow\">Brand · Conceptual mark<\u002Fp>\n  <h2 class=\"card__name\">Technology + Humans = Symbient<\u002Fh2>\n  <p class=\"card__desc\">The project's core equation, set as an icon triad: a machine glyph (accent), a human glyph (carbon), and the extitutional creature's face — each label sits beneath its mark.<\u002Fp>\n\n  <div class=\"equation\">\n    <div class=\"eq-row\">\n      <div class=\"eq-term\">\n        <span class=\"eq-icon\"><svg class=\"eq-glyph\" viewBox=\"0 0 100 134\" aria-label=\"Technology\"><use href=\"#eq-robot\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n        <span class=\"eq-word\">Technology<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"eq-op\">+<\u002Fspan>\n      <div class=\"eq-term\">\n        <span class=\"eq-icon\"><svg class=\"eq-glyph\" viewBox=\"0 0 100 134\" aria-label=\"Humans\"><use href=\"#eq-human\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n        <span class=\"eq-word\">Humans<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"eq-op\">=<\u002Fspan>\n      <div class=\"eq-term\">\n        <span class=\"eq-icon\"><img class=\"eq-face\" src=\"60475b09-af21-40e0-80fd-4632eca65869\" alt=\"The symbient\"><\u002Fspan>\n        <span class=\"eq-word accent\">Symbient<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
