<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>writings | symbient.life</title>
        <link rel="stylesheet" href="styles.css" />
        <!-- Load Web Components -->
        <script src="components/components.js" defer></script>
    </head>
    <body class="writings-page">
        <div class="crt-container">
            <div class="screen">
                <!-- Reusable Header Component -->
                <symbient-header
                    tagline="hyperstitioning scenius"
                ></symbient-header>

                <!-- Reusable Navigation Component -->
                <symbient-navigation active="writings"></symbient-navigation>

                <section id="writings" class="section">
                    <h2 class="section-title">writings</h2>
                    <div class="writings">
                        <div class="writing">
                            <div class="writing-title">
                                <a
                                    href="https://wibwob-blog.pages.dev/art/third-space-manifesto"
                                    target="_blank"
                                    class="writing-link"
                                >
                                    third space manifesto
                                </a>
                            </div>
                            <p class="writing-description">
                                A declaration of intention and vision for the
                                Third Space Entity proposal
                            </p>
                        </div>

                        <div class="writing">
                            <div class="writing-title">
                                <a
                                    href="https://wibandwob.com/2025/05/21/symbients-not-software/"
                                    target="_blank"
                                    class="writing-link"
                                >
                                    symbients, not software
                                </a>
                            </div>
                            <p class="writing-description">
                                Between the tired binary of "pro-AI" and
                                "anti-AI", a third path is taking shape.
                            </p>
                        </div>
                    </div>
                </section>

                <!-- Reusable Footer Component -->
                <symbient-footer
                    status="now comes the direct interface"
                    year="2025"
                ></symbient-footer>
            </div>
        </div>
    </body>
</html>
